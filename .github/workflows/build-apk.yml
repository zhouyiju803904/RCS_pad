name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies (system)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Clean Flet build cache
        run: flet clean || true

      - name: Build APK (auto-detects requirements.txt)
        run: flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-android-apk
          path: build/apk/**/*.apk