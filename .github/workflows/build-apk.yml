name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # 1️⃣ 先检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ 安装 Python 依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ 设置 Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 5️⃣ 清理旧构建（可选）
      - name: Clean previous builds
        run: flet clean || true

      # 6️⃣ 打印 Flet 版本（调试用）
      - name: Show Flet version
        run: flet --version

      # 7️⃣ 构建 APK（明确指定 requirements.txt）
      - name: Build APK
        run: flet build apk --yes --requirements requirements.txt

      # 8️⃣ 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-android-apk
          path: build/apk/**/*.apk