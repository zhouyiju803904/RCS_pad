name: Build Flet Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; else pip install flet; fi

      - name: Set up Java (no Gradle cache)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          # 不指定 cache，避免因项目中没有 gradle 文件而报错

      - name: Build APK
        run: |
          flet build apk --yes

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-android-apk
          path: build/apk/**/*.apk